name: Track BuildStream Sources

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      group:
        description: 'Which element group to track'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - auto-merge
          - manual-merge
          - tarballs

permissions:
  contents: write
  pull-requests: write

env:
  BST2_IMAGE: registry.gitlab.com/freedesktop-sdk/infrastructure/freedesktop-sdk-docker-images/bst2:f89b4aef847ef040b345acceda15a850219eb8f1

jobs:
  track:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - group: auto-merge
            branch: auto/track-bluefin-sources
            title: "chore(deps): track Bluefin element sources"
            elements: >-
              bluefin/brew.bst
              bluefin/common.bst
              bluefin/jetbrains-mono.bst
              bluefin/shell-extensions/app-indicators.bst
              bluefin/shell-extensions/blur-my-shell.bst
              bluefin/shell-extensions/dash-to-dock.bst
              bluefin/shell-extensions/gsconnect.bst
              bluefin/shell-extensions/search-light.bst
              bluefin/shell-extensions/logomenu.bst
          - group: manual-merge
            branch: auto/track-core-sources
            title: "chore(deps): track core and junction sources"
            elements: >-
              gnome-build-meta.bst
              freedesktop-sdk.bst

    steps:
      - name: Should this group run?
        id: gate
        run: |
          GROUP="${{ github.event.inputs.group || 'all' }}"
          if [ "$GROUP" = "all" ] || [ "$GROUP" = "${{ matrix.group }}" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Just
        uses: extractions/setup-just@f8a3cce218d9f83db3a2ecd90e41ac3de6cdfd9b # v3

      - name: Checkout repository
        if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull BuildStream container image
        if: steps.gate.outputs.run == 'true'
        run: podman pull "$BST2_IMAGE"

      - name: Track sources with BuildStream
        if: steps.gate.outputs.run == 'true'
        run: |
          ELEMENTS="${{ matrix.elements }}"
          just bst --no-interactive source track "$ELEMENTS"

      - name: Check for changes
        if: steps.gate.outputs.run == 'true'
        id: changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected:"
            git diff --stat
          fi

      - name: Create PR
        if: steps.gate.outputs.run == 'true' && steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ matrix.branch }}"
          TITLE="${{ matrix.title }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -B "$BRANCH"
          git add elements/
          git commit -m "$TITLE"
          git push --force-with-lease origin "$BRANCH"

          # Close existing PR for this branch if any
          EXISTING_PR=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -n "$EXISTING_PR" ]; then
            echo "Closing existing PR #$EXISTING_PR"
            gh pr close "$EXISTING_PR" --delete-branch=false || true
          fi

          # Create the PR
          PR_URL=$(gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "$TITLE" \
            --body "$(cat <<'EOF'
          ## BuildStream Source Tracking

          Automated update via `bst source track`. Updates element refs to
          latest commits matching their configured `track:` patterns.

          **Group:** ${{ matrix.group }}

          ---
          *Generated by [Track BuildStream Sources](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*
          EOF
          )")

          echo "Created PR: $PR_URL"

          echo "Enabling auto-merge..."
          gh pr merge "$PR_URL" --auto --squash || echo "::warning::Could not enable auto-merge"

  track-tarballs:
    runs-on: ubuntu-24.04
    if: >-
      github.event.inputs.group == 'all' ||
      github.event.inputs.group == 'tarballs' ||
      github.event_name == 'schedule'
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Just
        uses: extractions/setup-just@f8a3cce218d9f83db3a2ecd90e41ac3de6cdfd9b # v3

      - name: Check for tarball updates
        id: tarballs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # ── brew-tarball: ublue-os/packages homebrew releases ──
          echo "=== Checking brew-tarball ==="
          BREW_RELEASE=$(gh api repos/ublue-os/packages/releases \
            --jq '[.[] | select(.tag_name | startswith("homebrew-"))][0].tag_name')
          echo "Latest brew release: $BREW_RELEASE"

          BST_FILE_X86="elements/bluefin/brew-tarball/brew-tarball-x86_64.bst"
          BST_FILE_ARM="elements/bluefin/brew-tarball/brew-tarball-aarch64.bst"
          CURRENT_TAG=$(grep -oP 'download/\K[^/]+' "$BST_FILE_X86")
          echo "Current tag: $CURRENT_TAG"

          if [ "$BREW_RELEASE" != "$CURRENT_TAG" ]; then
            echo "Brew tarball needs update: $CURRENT_TAG -> $BREW_RELEASE"
            sed -i "s|download/${CURRENT_TAG}/|download/${BREW_RELEASE}/|" "$BST_FILE_X86"
            sed -i "s|download/${CURRENT_TAG}/|download/${BREW_RELEASE}/|" "$BST_FILE_ARM"

            just bst -o arch x86_64 source track bluefin/brew-tarball/brew-tarball-x86_64.bst
            just bst -o arch aarch64 source track bluefin/brew-tarball/brew-tarball-aarch64.bst
          fi

          # ── wallpapers: ublue-os/artwork bluefin releases ──
          echo ""
          echo "=== Checking wallpapers ==="
          WALL_RELEASE=$(gh api repos/ublue-os/artwork/releases \
            --jq '[.[] | select(.tag_name | startswith("bluefin-"))][0].tag_name')
          echo "Latest wallpaper release: $WALL_RELEASE"

          BST_FILE="elements/bluefin/wallpapers.bst"
          CURRENT_TAG=$(grep -oP 'download/\K[^/]+' "$BST_FILE")
          echo "Current tag: $CURRENT_TAG"

          if [ "$WALL_RELEASE" != "$CURRENT_TAG" ]; then
            echo "Wallpapers need update: $CURRENT_TAG -> $WALL_RELEASE"
            NEW_URL="https://github.com/ublue-os/artwork/releases/download/${WALL_RELEASE}/bluefin-wallpapers-gnome.tar.zstd"
            sed -i "s|download/${CURRENT_TAG}/|download/${WALL_RELEASE}/|" "$BST_FILE"

            just bst -o arch x86_64 source track bluefin/wallpapers.bst
          fi

          # ── 1password-cli: 1Password CLI releases ──
          echo ""
          echo "=== Checking 1password-cli ==="
          ONEPASSWORD_PACKAGES=$(curl -fsL "https://downloads.1password.com/linux/debian/amd64/dists/stable/main/binary-amd64/Packages")

          CLI_VERSION=$(echo "$ONEPASSWORD_PACKAGES" | grep -A5 "^Package: 1password-cli$" | grep "^Version:" | head -1 | awk '{print $2}' | sed 's/-[0-9]*$//')
          echo "Latest CLI version: $CLI_VERSION"


          CURRENT_CLI_VERSION=$(grep -oP 'v\K[0-9.]+(?=/)' elements/bluefin/1password-cli/1password-cli-x86_64.bst | head -1)
          echo "Current CLI version: $CURRENT_CLI_VERSION"

          if [ -n "$CLI_VERSION" ] && [ "$CLI_VERSION" != "$CURRENT_CLI_VERSION" ]; then
            echo "CLI needs update: $CURRENT_CLI_VERSION -> $CLI_VERSION"
            sed -i "s|v${CURRENT_CLI_VERSION}|v${CLI_VERSION}|g" elements/bluefin/1password-cli/1password-cli-x86_64.bst
            sed -i "s|v${CURRENT_CLI_VERSION}|v${CLI_VERSION}|g" elements/bluefin/1password-cli/1password-cli-aarch64.bst

            just bst -o arch x86_64 source track bluefin/1password-cli/1password-cli-x86_64.bst
            just bst -o arch aarch64 source track bluefin/1password-cli/1password-cli-aarch64.bst

          fi


          # ── 1password: 1Password desktop releases ──
          echo ""
          echo "=== Checking 1password desktop ==="
          DESKTOP_VERSION=$(echo "$ONEPASSWORD_PACKAGES" | grep -A10 "^Package: 1password$" | grep "^Version:" | head -1 | awk '{print $2}')
          echo "Latest desktop version: $DESKTOP_VERSION"

          CURRENT_DESKTOP_VERSION=$(grep -oP '1password-\K[0-9.]+(?=\.x64)' elements/bluefin/1password/1password-x86_64.bst | head -1)
          echo "Current desktop version: $CURRENT_DESKTOP_VERSION"

          if [ -n "$DESKTOP_VERSION" ] && [ "$DESKTOP_VERSION" != "$CURRENT_DESKTOP_VERSION" ]; then
            echo "Desktop needs update: $CURRENT_DESKTOP_VERSION -> $DESKTOP_VERSION"
            sed -i "s|1password-${CURRENT_DESKTOP_VERSION}\.x64|1password-${DESKTOP_VERSION}.x64|g" elements/bluefin/1password/1password-x86_64.bst
            sed -i "s|1password-${CURRENT_DESKTOP_VERSION}\.arm64|1password-${DESKTOP_VERSION}.arm64|g" elements/bluefin/1password/1password-aarch64.bst

            just bst -o arch x86_64 source track bluefin/1password/1password-x86_64.bst
            just bst -o arch aarch64 source track bluefin/1password/1password-aarch64.bst
          fi

          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected:"
            git diff --stat
          fi

      - name: Create tarball update PR
        if: steps.tarballs.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="auto/track-tarball-sources"
          TITLE="chore(deps): update tarball sources"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -B "$BRANCH"
          git add elements/
          git commit -m "$TITLE"
          git push --force-with-lease origin "$BRANCH"

          EXISTING_PR=$(gh pr list --head "$BRANCH" --json number \
            --jq '.[0].number' 2>/dev/null || true)
          if [ -n "$EXISTING_PR" ]; then
            gh pr close "$EXISTING_PR" --delete-branch=false || true
          fi

          PR_URL=$(gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "$TITLE" \
            --body "$(cat <<'EOF'
          ## Tarball Source Updates

          Automated check for new releases of tarball-sourced dependencies.

          ### Checked sources
          - `elements/bluefin/brew-tarball/brew-tarball-{x86_64,aarch64}.bst` -- ublue-os/packages
          - `elements/bluefin/wallpapers.bst` -- ublue-os/artwork
          - `elements/bluefin/1password-cli/1password-cli-{x86_64,aarch64}.bst` -- 1Password CLI
          - `elements/bluefin/1password/1password-{x86_64,aarch64}.bst` -- 1Password desktop

          ---
          *Generated by [Track BuildStream Sources](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*
          EOF
          )")

          echo "Created PR: $PR_URL"
          echo "Enabling auto-merge..."
          gh pr merge "$PR_URL" --auto --squash || echo "::warning::Could not enable auto-merge"
